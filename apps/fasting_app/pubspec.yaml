name: fasting_app
description: Fasting timer app built on shared timer and storage packages.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  app_core: ^0.1.0
  analytics: ^0.1.0
  monetization: ^0.1.0
  notifications: ^0.1.0
  storage: ^0.1.0
  timer_engine: ^0.1.0
  ui_kit: ^0.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
